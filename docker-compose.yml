services:
  postgres:
    image: postgres:15
    container_name: flowbot-postgres
    environment:
      POSTGRES_USER: flowbot
      POSTGRES_PASSWORD: flowbot123
      POSTGRES_DB: evolution
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: flowbot-redis
    ports:
      - "6379:6379"
    restart: always

  evolution-api:
    image: atendai/evolution-api:v1.8.2
    container_name: evolution-api
    ports:
      - "8080:8080"
    environment:
      AUTHENTICATION_API_KEY: flowbot123
      AUTHENTICATION_TYPE: apikey
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://flowbot:flowbot123@postgres:5432/evolution
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis:6379
      CACHE_REDIS_PREFIX_KEY: evolution
      CACHE_REDIS_SAVE_INSTANCES: "true"
      QRCODE_LIMIT: "30"
      CONFIG_SESSION_PHONE_VERSION: "2.3000.1023181128"
    depends_on:
      - postgres
      - redis
    restart: always

volumes:
  postgres_data: