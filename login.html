<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FlowBot — Entrar</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#4f8ef7;--blue-dark:#3570d4;--blue-light:#e8f1fe;
  --bg:#f0f6ff;--surface:#fff;--border:#dce8fb;
  --text:#1a2540;--muted:#7a90b5;--green:#34c97e;--red:#f05a5a;
}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;position:relative;overflow:hidden}

/* BG BLOBS */
.blob{position:fixed;border-radius:50%;filter:blur(80px);opacity:.18;pointer-events:none}
.blob1{width:500px;height:500px;background:#4f8ef7;top:-100px;left:-100px}
.blob2{width:400px;height:400px;background:#7eb8fc;bottom:-80px;right:-80px}
.blob3{width:300px;height:300px;background:#a3cdfd;top:50%;left:50%;transform:translate(-50%,-50%)}

.card{
  background:var(--surface);border:1.5px solid var(--border);border-radius:24px;
  padding:40px 36px;width:100%;max-width:420px;position:relative;z-index:1;
  box-shadow:0 20px 60px rgba(79,142,247,.12);
  animation:slideUp .5s cubic-bezier(.4,0,.2,1) both;
}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}

.logo{display:flex;align-items:center;gap:10px;margin-bottom:28px}
.logo-icon{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,var(--blue),#7eb8fc);display:flex;align-items:center;justify-content:center;font-size:1.2rem;box-shadow:0 4px 14px rgba(79,142,247,.35)}
.logo-text{font-size:1.2rem;font-weight:800;letter-spacing:-.02em}
.logo-text span{color:var(--blue)}

.card-title{font-size:1.5rem;font-weight:800;margin-bottom:6px;letter-spacing:-.02em}
.card-sub{font-size:.85rem;color:var(--muted);margin-bottom:28px}

.tabs{display:flex;background:var(--bg);border-radius:12px;padding:4px;margin-bottom:24px;gap:4px}
.tab{flex:1;padding:9px;border-radius:9px;font-size:.85rem;font-weight:600;text-align:center;cursor:pointer;color:var(--muted);transition:all .2s;border:none;background:none;font-family:inherit}
.tab.active{background:var(--surface);color:var(--blue);box-shadow:0 2px 8px rgba(79,142,247,.15)}

.form-group{margin-bottom:16px}
.form-label{display:block;font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:6px}
.form-input{
  width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:11px;
  font-family:'Plus Jakarta Sans',sans-serif;font-size:.9rem;color:var(--text);
  background:var(--surface);outline:none;transition:all .2s;
}
.form-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(79,142,247,.12)}
.form-input::placeholder{color:#c5d5ec}

.btn{
  width:100%;padding:13px;border-radius:12px;border:none;
  font-family:'Plus Jakarta Sans',sans-serif;font-size:.95rem;font-weight:700;
  cursor:pointer;transition:all .2s;margin-top:4px;
}
.btn.primary{background:var(--blue);color:#fff;box-shadow:0 4px 16px rgba(79,142,247,.35)}
.btn.primary:hover{background:var(--blue-dark);transform:translateY(-1px);box-shadow:0 6px 20px rgba(79,142,247,.4)}
.btn.primary:active{transform:translateY(0)}
.btn.loading{opacity:.7;pointer-events:none}

.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--muted);font-size:.78rem}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}

.social-btn{
  width:100%;padding:11px;border-radius:12px;border:1.5px solid var(--border);
  background:var(--surface);font-family:'Plus Jakarta Sans',sans-serif;font-size:.85rem;font-weight:600;
  cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;color:var(--text);
}
.social-btn:hover{border-color:var(--blue);background:var(--blue-light);color:var(--blue-dark)}

.msg{padding:10px 14px;border-radius:10px;font-size:.82rem;font-weight:500;margin-bottom:14px;display:none}
.msg.error{background:#ffeaea;color:var(--red);display:block}
.msg.success{background:#e6faf1;color:var(--green);display:block}

.forgot{text-align:right;margin-top:-10px;margin-bottom:16px}
.forgot a{font-size:.78rem;color:var(--blue);font-weight:600;cursor:pointer;text-decoration:none}
.forgot a:hover{text-decoration:underline}

.footer-text{text-align:center;margin-top:20px;font-size:.78rem;color:var(--muted)}
.footer-text a{color:var(--blue);font-weight:600;cursor:pointer}
</style>
</head>
<body>
<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="blob blob3"></div>

<div class="card">
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <div class="logo-text">Flow<span>Bot</span></div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('login',this)">Entrar</button>
    <button class="tab" onclick="switchTab('register',this)">Criar conta</button>
  </div>

  <div id="msgBox"></div>

  <!-- LOGIN -->
  <div id="loginForm">
    <div class="form-group">
      <label class="form-label">E-mail</label>
      <input class="form-input" id="loginEmail" type="email" placeholder="seuemail@gmail.com"/>
    </div>
    <div class="form-group">
      <label class="form-label">Senha</label>
      <input class="form-input" id="loginPassword" type="password" placeholder="••••••••"/>
    </div>
    <div class="forgot"><a onclick="showMsg('📧 Email de recuperação enviado!','success')">Esqueci minha senha</a></div>
    <button class="btn primary" id="loginBtn" onclick="doLogin()">Entrar na conta</button>
    <div class="divider">ou continue com</div>
    <button class="social-btn" onclick="showMsg('🔜 Login social em breve!','success')">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continuar com Google
    </button>
  </div>

  <!-- REGISTER -->
  <div id="registerForm" style="display:none">
    <div class="form-group">
      <label class="form-label">Nome completo</label>
      <input class="form-input" id="regName" type="text" placeholder="João Silva"/>
    </div>
    <div class="form-group">
      <label class="form-label">E-mail</label>
      <input class="form-input" id="regEmail" type="email" placeholder="seuemail@gmail.com"/>
    </div>
    <div class="form-group">
      <label class="form-label">Senha</label>
      <input class="form-input" id="regPassword" type="password" placeholder="Mínimo 6 caracteres"/>
    </div>
    <button class="btn primary" id="regBtn" onclick="doRegister()">Criar minha conta grátis</button>
  </div>

  <div class="footer-text" id="footerText">
    Não tem conta? <a onclick="switchTab('register', document.querySelectorAll('.tab')[1])">Criar grátis</a>
  </div>
</div>

<script>
const API = 'http://localhost:3000';

function switchTab(tab, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
  document.getElementById('footerText').innerHTML = tab === 'login'
    ? 'Não tem conta? <a onclick="switchTab(\'register\', document.querySelectorAll(\'.tab\')[1])">Criar grátis</a>'
    : 'Já tem conta? <a onclick="switchTab(\'login\', document.querySelectorAll(\'.tab\')[0])">Entrar</a>';
  clearMsg();
}

function showMsg(msg, type) {
  const box = document.getElementById('msgBox');
  box.className = 'msg ' + type;
  box.textContent = msg;
}
function clearMsg() {
  const box = document.getElementById('msgBox');
  box.className = 'msg';
  box.textContent = '';
}

async function doLogin() {
  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPassword').value;
  if (!email || !password) return showMsg('Preencha todos os campos!', 'error');

  const btn = document.getElementById('loginBtn');
  btn.textContent = 'Entrando...';
  btn.classList.add('loading');

  try {
    const res = await fetch(`${API}/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (data.error) {
      showMsg('❌ ' + data.error, 'error');
    } else {
      localStorage.setItem('token', data.token);
      localStorage.setItem('user', JSON.stringify(data.user));
      showMsg('✅ Login realizado! Redirecionando...', 'success');
      setTimeout(() => window.location.href = 'dashboard.html', 1200);
    }
  } catch(e) {
    showMsg('❌ Erro de conexão com o servidor', 'error');
  }

  btn.textContent = 'Entrar na conta';
  btn.classList.remove('loading');
}

async function doRegister() {
  const email = document.getElementById('regEmail').value;
  const password = document.getElementById('regPassword').value;
  if (!email || !password) return showMsg('Preencha todos os campos!', 'error');
  if (password.length < 6) return showMsg('Senha precisa ter mínimo 6 caracteres!', 'error');

  const btn = document.getElementById('regBtn');
  btn.textContent = 'Criando conta...';
  btn.classList.add('loading');

  try {
    const res = await fetch(`${API}/auth/register`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (data.error) {
      showMsg('❌ ' + data.error, 'error');
    } else {
      showMsg('✅ Conta criada! Verifique seu email para confirmar.', 'success');
    }
  } catch(e) {
    showMsg('❌ Erro de conexão com o servidor', 'error');
  }

  btn.textContent = 'Criar minha conta grátis';
  btn.classList.remove('loading');
}

// Enter key
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (document.getElementById('loginForm').style.display !== 'none') doLogin();
    else doRegister();
  }
});
</script>
</body>
</html>
